<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earth Watch</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222;
      --border: rgba(255,255,255,0.08); --border-hover: rgba(255,255,255,0.18);
      --text: #f0ede8; --muted: #888; --dim: #555;
      --green: #2ECC71; --green-bg: rgba(46,204,113,0.12);
    }
    body { font-family:-apple-system,'SF Pro Text','Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem 1.5rem; }
    .logo { font-family:'SF Mono','Fira Code',monospace; font-size:15px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--green); margin-bottom:0.5rem; }
    .tagline { font-family:'SF Mono','Fira Code',monospace; font-size:11px; color:var(--dim); letter-spacing:0.08em; margin-bottom:3rem; }
    .enter-btn { font-family:'SF Mono','Fira Code',monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; padding:10px 28px; border-radius:24px; border:0.5px solid rgba(46,204,113,0.4); color:var(--green); background:var(--green-bg); transition:border-color 0.15s,background 0.15s; }
    .enter-btn:hover { border-color:var(--green); background:rgba(46,204,113,0.2); }
  </style>
</head>
<body>
  <div class="logo">&#127758; Earth Watch</div>
  <div class="tagline">planetary monitoring &amp; environmental intelligence</div>
  <a href="/earthwatch.html" class="enter-btn">Enter &#8599;</a>
</body>
</html>
