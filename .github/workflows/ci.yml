name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Smoke test server boot
        run: |
          npm start &
          SERVER_PID=$!
          for i in {1..10}; do
            curl -sf http://localhost:3000/ > /dev/null && break
            sleep 1
          done
          curl -sf http://localhost:3000/ > /dev/null
          kill $SERVER_PID
