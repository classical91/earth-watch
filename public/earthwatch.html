<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earth Watch</title>
  <meta name="description" content="Earth Watch — weather, disasters, seismic, maritime, air quality, live cams, and global intelligence." />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <div class="logo">🌎 Earth Watch</div>
      <div class="subhead">Signal-first global monitoring dashboard</div>
    </div>
    <div class="topbar-right">
      <div class="status">
        <span class="status-dot"></span>
        <span>Local Time</span>
      </div>
      <div class="ts" id="ts"></div>
    </div>
  </header>

  <section class="hero">
    <div class="hero-left">
      <h1>Global monitoring in one place.</h1>
      <p>Weather, seismic, disasters, air quality, maritime traffic, space weather, cams, and intelligence links.</p>
    </div>
    <div class="hero-actions">
      <input id="searchInput" class="search" type="search" placeholder="Filter sources..." aria-label="Filter sources" />
      <button id="toggleAllBtn" class="btn" type="button">Collapse all</button>
      <button id="favoritesOnlyBtn" class="btn" type="button">Favorites only</button>
    </div>
  </section>

  <nav class="nav-pills" id="navPills" aria-label="Sections"></nav>

  <main id="sectionsRoot"></main>

  <footer class="footer">Earth Watch</footer>

  <script src="/data/sources.js"></script>
  <script src="/app.js"></script>
</body>
</html>
